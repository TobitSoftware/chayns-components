name: Publish to NPM (v5)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v5.[0-9]+.[0-9]+'
      - 'v5.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v5.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  id-token: write # Required for OIDC
  contents: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      API_TOKEN_KEY: ${{ secrets.API_TOKEN_KEY }}
      API_TOKEN_SECRET: ${{ secrets.API_TOKEN_SECRET }}
      TAG: >-
        ${{ contains(github.ref_name, 'alpha') && 'alpha' || (contains(github.ref_name, '-')
        && 'beta' || 'latest') }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Update npm
        shell: bash
        run: |
          set -euo pipefail
          npm install -g npm@latest
          echo "npm:  $(npm --version)"
          echo "node: $(node --version)"

      - name: Verify npm authentication
        shell: bash
        run: |
          set -euo pipefail
          npm whoami

      - name: Build packages
        uses: ./.github/actions/lerna-build

      - name: Publish packages
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          set -euo pipefail
          npx lerna publish from-package --yes --dist-tag "${TAG}" --no-provenance

      - name: Generate and upload docs
        shell: bash
        run: |
          set -euo pipefail
          npm run generate:docs

  deploy:
    needs: publish
    if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
    uses: ./.github/workflows/storybook.yml
    with:
      ref: ${{ github.ref }}
    secrets: inherit